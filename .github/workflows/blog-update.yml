name: Generar post de blog automático

on:
  schedule:
    # Cada 2 días a las 9:00 AM (hora Madrid = UTC+2 en verano, UTC+1 en invierno)
    - cron: '0 7 */2 * *'
  workflow_dispatch:
    inputs:
      tema:
        description: 'Tema del artículo (opcional, dejar vacío para generación automática)'
        required: false
        default: ''

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar nuevo post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEMA_PERSONALIZADO: ${{ github.event.inputs.tema }}
        run: python scripts/generate-post.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "Blog Bot – De La Roca"
          git config user.email "bot@estolasparaeventos.com"
          git add posts.json sitemap.xml
          if git diff --staged --quiet; then
            echo "No hay cambios nuevos"
          else
            git commit -m "Blog: nuevo artículo automático $(date +'%Y-%m-%d')"
            git push
          fi
